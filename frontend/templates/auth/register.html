{% extends "base.html" %}
{% block navbar %}{% endblock %}
{% block title %}Register — Team Cyber{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <span class="brand-hex lg">⬡</span>
      <h1>TEAM<strong>CYBER</strong></h1>
      <p class="auth-tagline">Create your analyst account</p>
    </div>

    <div id="auth-error" class="alert alert-error hidden"></div>

    <form id="register-form" class="auth-form" autocomplete="off">
      <div class="form-group">
        <label>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Username
        </label>
        <input type="text" id="username" placeholder="analyst_01" required />
      </div>

      <div class="form-group">
        <label>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,12 2,6"/></svg>
          Email Address
        </label>
        <input type="email" id="email" placeholder="analyst@company.com" required />
      </div>

      <div class="form-group">
        <label>
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Password
          <span class="hint">(min 8 characters)</span>
        </label>
        <input type="password" id="password" placeholder="••••••••" required minlength="8" />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="reg-btn" style="margin-top:.5rem">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden">
          <span class="spinner"></span>
          Creating…
        </span>
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="auth-footer">
      Already have an account? <a href="/login">Sign in →</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const btn   = document.getElementById("reg-btn");
  const errEl = document.getElementById("auth-error");
  btn.querySelector(".btn-text").classList.add("hidden");
  btn.querySelector(".btn-loader").classList.remove("hidden");
  btn.disabled = true;
  errEl.classList.add("hidden");

  const res  = await fetch("/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: document.getElementById("username").value,
      email:    document.getElementById("email").value,
      password: document.getElementById("password").value,
    }),
  });
  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("tc_token", data.token);
    localStorage.setItem("tc_user", data.username);
    window.location.href = "/dashboard";
  } else {
    errEl.textContent = data.error || "Registration failed";
    errEl.classList.remove("hidden");
    btn.querySelector(".btn-text").classList.remove("hidden");
    btn.querySelector(".btn-loader").classList.add("hidden");
    btn.disabled = false;
  }
});
</script>
{% endblock %}
